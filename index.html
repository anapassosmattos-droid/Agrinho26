<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agro Sustentável | Futuro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header id="main-header">
        <nav class="container">
            <div class="logo">Agro<span>Sustentável</span></div>
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#interacao">Interação</a></li>
                <li><button id="btn-dark-mode">Alternar Tema</button></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="home" class="hero-section">
            <div class="hero-content">
                <h1 id="welcome-text">Agro forte, futuro sustentável</h1>
                <p>O equilíbrio perfeito entre a produção e o meio ambiente.</p>
            </div>
        </section>

        <section id="interacao" class="container section-padding">
            <h2>Participe da Mudança</h2>
            <div class="card-interativo">
                <label for="user-name">Digite seu nome para começar:</label>
                <div class="form-group">
                    <input type="text" id="user-name" placeholder="Ex: João Silva">
                    <button id="btn-saudar">Confirmar</button>
                </div>
                <div id="greeting-area" class="hidden">
                    <p id="personal-welcome"></p>
                    <div class="contador-container">
                        <span>Ações sustentáveis hoje: </span>
                        <strong id="counter-value">0</strong>
                        <button id="btn-incrementar">+1 Ação</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Tema Agrinho - Sustentabilidade no Campo.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
